<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Sanctuaire | Au-delà des Pages</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --rose: #DE3566; --or: #D4AF37; --noir: #1a1a1a; --gris: #f4f4f4; }
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background: white; padding: 40px; border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 3px double var(--or); text-align: center;
            max-width: 500px; width: 100%; animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-royal { font-family: 'Cinzel Decorative', serif; color: var(--rose); font-size: 1.5rem; text-transform: uppercase; margin-bottom: 20px; }
        
        /* Onglets Inscription / Connexion */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 10px; cursor: pointer; font-weight: 600; color: #aaa; transition: 0.3s; }
        .tab.active { color: var(--rose); border-bottom: 2px solid var(--rose); }

        .form-box { display: none; }
        .form-box.active { display: block; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-weight: 600; font-size: 0.7rem; color: var(--or); text-transform: uppercase; margin-bottom: 5px; }
        .input-group input { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #eee;
            background: var(--gris); outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--rose); background: #fff; }

        .btn-royal {
            background: var(--rose); color: white; border: none; width: 100%;
            padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-top: 10px;
        }
        .btn-royal:hover { background: #b02a50; transform: translateY(-2px); }

        .error-msg { color: var(--rose); font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-royal">Au-delà des Pages</div>
        
        <div class="tabs">
            <div class="tab active" onclick="showForm('login', this)">Connexion</div>
            <div class="tab" onclick="showForm('register', this)">Créer un compte</div>
        </div>

        <div id="login-form" class="form-box active">
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Email Royal</label>
                    <input type="email" id="loginEmail" placeholder="votre@email.com" required>
                </div>
                <div class="input-group">
                    <label>Clé Secrète</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required>
                </div>
                <p id="loginError" class="error-msg">Identifiants incorrects.</p>
                <button type="submit" class="btn-royal">Ouvrir le Coffre ✨</button>
            </form>
        </div>

        <div id="register-form" class="form-box">
            <form onsubmit="handleRegister(event)">
                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex:1;">
                        <label>Prénom</label>
                        <input type="text" id="regPrenom" placeholder="Jean" required>
                    </div>
                    <div class="input-group" style="flex:1;">
                        <label>Nom</label>
                        <input type="text" id="regNom" placeholder="Dupont" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Adresse Postale (pour vos colis)</label>
                    <input type="text" id="regAdresse" placeholder="12 rue des Livres, 97300 Cayenne" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="votre@email.com" required>
                </div>
                <div class="input-group">
                    <label>Choisir une Clé Secrète</label>
                    <input type="password" id="regPass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-royal">Devenir Membre 👑</button>
            </form>
        </div>

        <a href="index.html" style="margin-top: 20px; display: block; color: #888; text-decoration: none; font-size: 0.75rem;">← Retour à l'accueil</a>
    </div>

    <script>
        // Changer d'onglet
        function showForm(type, el) {
            document.querySelectorAll('.form-box').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(type + '-form').classList.add('active');
            el.classList.add('active');
        }

        // Gérer l'inscription
        function handleRegister(e) {
            e.preventDefault();
            const userData = {
                prenom: document.getElementById('regPrenom').value,
                nom: document.getElementById('regNom').value,
                adresse: document.getElementById('regAdresse').value,
                email: document.getElementById('regEmail').value,
                pass: document.getElementById('regPass').value
            };
            
            // On enregistre dans le navigateur (simulé)
            localStorage.setItem(userData.email, JSON.stringify(userData));
            alert("Compte créé avec succès, " + userData.prenom + " ! Connectez-vous maintenant.");
            location.reload(); 
        }

        // Gérer la connexion
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            
            const storedUser = localStorage.getItem(email);
            
            if (storedUser) {
                const user = JSON.parse(storedUser);
                if (user.pass === pass) {
                    sessionStorage.setItem('member_data', JSON.stringify(user));
                    window.location.href = 'espace-membre-prive.html';
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
    </script>
</body>
</html>
