<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Royale | Au-delà des Pages</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --rose: #DE3566; --or: #D4AF37; --noir: #1a1a1a; --diamant: #e0f7fa; }
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* LE COFFRE DE CONNEXION */
        .login-vault {
            background: white; padding: 60px; border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 3px double var(--or); text-align: center;
            max-width: 450px; width: 90%; position: relative;
        }

        .login-vault h1 {
            font-family: 'Cinzel Decorative', serif; color: var(--rose);
            font-size: 1.8rem; text-transform: uppercase; margin-bottom: 10px;
        }

        .crown-icon { font-size: 3rem; margin-bottom: 20px; display: block; filter: drop-shadow(0 0 5px var(--or)); }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-weight: 600; font-size: 0.8rem; color: var(--or); text-transform: uppercase; margin-bottom: 5px; }
        .input-group input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #eee;
            background: #f9f9f9; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--rose); box-shadow: 0 0 10px rgba(222, 53, 102, 0.1); }

        .btn-royal-login {
            background: var(--rose); color: white; border: none; width: 100%;
            padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.4s;
            box-shadow: 0 10px 20px rgba(222, 53, 102, 0.2);
        }
        .btn-royal-login:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(222, 53, 102, 0.4); }

        .back-link { margin-top: 25px; display: block; color: #888; text-decoration: none; font-size: 0.8rem; transition: 0.3s; }
        .back-link:hover { color: var(--rose); }

    </style>
</head>
<body>

    <div class="login-vault">
        <span class="crown-icon">👑</span>
        <h1>Accès Membre</h1>
        <p style="color: #666; font-style: italic; margin-bottom: 30px;">Entrez dans votre sanctuaire littéraire</p>
        
        <form>
            <div class="input-group">
                <label>Identifiant Royal</label>
                <input type="email" placeholder="votre@email.com">
            </div>
            <div class="input-group">
                <label>Clé Secrète</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button type="button" class="btn-royal-login">Ouvrir le Coffre ✨</button>
        </form>

        <a href="index.html" class="back-link">← Retourner à l'accueil</a>
    </div>

</body>
</html>
