<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion Royale | Au-delà des Pages</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --rose: #DE3566; --or: #D4AF37; --noir: #1a1a1a; }
        body { 
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #2a2a2a 0%, #1a1a1a 100%); font-family: 'Poppins', sans-serif;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 25px; border: 2px solid var(--or);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 380px; text-align: center;
        }
        h2 { font-family: 'Cinzel Decorative'; color: var(--rose); margin: 0 0 30px; }
        input { 
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; 
            border: 1px solid #ddd; box-sizing: border-box; outline: none;
        }
        .btn-login {
            background: var(--noir); color: white; border: none; width: 100%; 
            padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-login:hover { background: var(--rose); transform: translateY(-2px); }

        /* ESPACE CHOIX ELISA */
        #adminChoice { display: none; }
        .choice-box { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-choice {
            padding: 15px; border-radius: 10px; text-decoration: none; font-weight: 700;
            transition: 0.3s; border: 2px solid var(--noir);
        }
        .go-admin { background: var(--noir); color: white; }
        .go-member { background: white; color: var(--noir); }
        .go-admin:hover { background: var(--rose); border-color: var(--rose); }
    </style>
</head>
<body>

<div class="login-card">
    <div id="loginForm">
        <h2>Se Connecter</h2>
        <input type="email" id="emailInput" placeholder="Email (audeladespages.contact@gmail.com)">
        <input type="password" id="passInput" placeholder="Mot de passe (Mvmanon16!)">
        <button class="btn-login" onclick="validerConnexion()">Ouvrir les Portes</button>
        <p id="error" style="color: red; font-size: 0.8rem; margin-top: 15px; display: none;">Oups ! Identifiants inconnus au bataillon.</p>
    </div>

    <div id="adminChoice">
        <h2 style="font-size: 1.2rem;">Bonjour Elisa !</h2>
        <p style="font-size: 0.8rem; color: #666; margin-bottom: 20px;">Où souhaitez-vous travailler aujourd'hui ?</p>
        <div class="choice-box">
            <a href="dashboard.html" class="btn-choice go-admin">📊 Gérer ma Maison (Admin)</a>
            <a href="sanctuaire.html" class="btn-choice go-member">📖 Entrer dans le Sanctuaire</a>
        </div>
    </div>
</div>

<script>
    function validerConnexion() {
        const mail = document.getElementById('emailInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        const error = document.getElementById('error');

        // CONDITION UNIQUE POUR TOI (ELISA)
        if (mail === "audeladespages.contact@gmail.com" && pass === "lollol17!") {
            // On mémorise que tu es l'admin pour la session
            sessionStorage.setItem('admin_auth', 'true');
            
            // On bascule l'affichage vers tes choix
            document.getElementById('loginForm').style.display = "none";
            document.getElementById('adminChoice').style.display = "block";
        } 
        else if (pass === "membre2026") { 
            // Simulation pour un membre lambda
            window.location.href = "sanctuaire.html";
        }
        else {
            // Si rien ne correspond
            error.style.display = "block";
        }
    }
</script>

</body>
</html>
