<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accès Privé | Au-delà des Pages</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Poppins:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --rose: #DE3566; --or: #D4AF37; --noir: #1a1a1a; }
        body { 
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #2a2a2a 0%, #1a1a1a 100%); font-family: 'Poppins', sans-serif;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 20px; border: 2px solid var(--or);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 350px; text-align: center;
        }
        h2 { font-family: 'Cinzel Decorative'; color: var(--rose); margin-bottom: 30px; }
        input { 
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; 
            border: 1px solid #ddd; box-sizing: border-box;
        }
        .btn-login {
            background: var(--noir); color: white; border: none; width: 100%; 
            padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-login:hover { background: var(--rose); transform: scale(1.02); }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Console Royale</h2>
    <input type="email" id="adminEmail" placeholder="Email Professionnel">
    <input type="password" id="adminPass" placeholder="Mot de passe secret">
    <button class="btn-login" onclick="checkAccess()">Entrer dans la Tour</button>
    <p id="error" style="color: red; font-size: 0.7rem; margin-top: 15px; display: none;">Accès refusé. Identifiants incorrects.</p>
</div>

<script>
    function checkAccess() {
        const email = document.getElementById('adminEmail').value;
        const pass = document.getElementById('adminPass').value;

        // Tes identifiants ultra-secrets
        if(email === "audeladespages.contact@gmail.com" && pass === "Mvmanon16!!!!!!!!!!!!!!!!!!!!!!!!!!!!!") {
            // On crée un petit jeton de session pour dire que tu es connectée
            sessionStorage.setItem('admin_auth', 'true');
            // On te redirige vers ton Dashboard
            window.location.href = "dashboard.html"; 
        } else {
            document.getElementById('error').style.display = "block";
        }
    }
</script>

</body>
</html>
