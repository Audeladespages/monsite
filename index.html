<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Au-delà des Pages | Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --rose: #DE3566; --or: #D4AF37; --noir: #1a1a1a; --diamant: #e0f7fa; }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* --- TON HEADER ROYAL (COPIÉ DE TA PAGE HEARD) --- */
        header {
            background: rgba(255, 255, 255, 0.98);
            padding: 10px 2%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: fixed; /* Reste en haut H24 */
            top: 0; left: 0; right: 0;
            z-index: 10000;
            border-bottom: 3px double var(--or);
        }

        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 1600px; margin: 0 auto; }
        
        .logo-box { position: relative; padding: 10px 30px; }
        .logo-box::before { content: ''; position: absolute; border: 2px solid var(--or); border-radius: 50%; width: 110%; height: 150%; top: -25%; left: -5%; opacity: 0.2; border-style: double; }
        
        .logo-royal { font-family: 'Cinzel Decorative', serif; font-size: 1.5rem; color: var(--rose); text-transform: uppercase; text-decoration: none; letter-spacing: 3px; }

        nav ul { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; align-items: center; }
        nav ul li a { text-decoration: none; color: var(--noir); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; transition: 0.3s; }
        nav ul li a:hover { color: var(--or); }

        .btn-membre-royal {
            background: #fff; color: var(--rose) !important; padding: 8px 18px; border-radius: 50px; border: 2px solid var(--or);
            font-weight: 800; display: flex; align-items: center; gap: 8px; font-size: 0.7rem;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2); transition: 0.4s;
        }

        /* --- TON ACCUEIL (LE CHAT) --- */
        .hero { 
            height: 100vh;
            background: #5b4d4d url('https://i.ibb.co/4w7zyRhm/o-1jamq0ji48dr11lk9gn1lhd16k7m.png') no-repeat center bottom;
            background-size: cover;
            display: flex; justify-content: flex-end; align-items: center; flex-direction: column;
            padding-bottom: 60px;
        }

        .hero-text {
            background: rgba(255, 255, 255, 0.85);
            padding: 30px 50px; border-radius: 40px; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
        }

        .hero h1 { font-family: 'Cinzel Decorative', serif; font-size: 2.2rem; margin: 0; color: var(--rose); }
        .hero p { font-style: italic; margin-top: 5px; color: var(--noir); }

    </style>
</head>
<body>

<header>
    <div class="header-container">
        <div class="logo-box">
            <a href="index.html" class="logo-royal">Au-delà des Pages</a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="boutique.html">Boutique</a></li>
                <li><a href="abonnements.html">Abonnements</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li>
                    <a href="#" class="btn-membre-royal">
                        <span style="font-size:1.2rem">👑</span> ESPACE MEMBRE <span>✨</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="hero-text">
        <h1>AU-DELÀ DES PAGES</h1>
        <p>L'accompagnement qui donne du peps et des étoiles à vos écrits !</p>
    </div>
</section>

</body>
</html>
