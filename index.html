<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Au-delà des Pages 🐾</title>
    <style>
        :root {
            --rose: #DE3566; --pale: #FF98AE; --orange: #FF9B3D;
            --jaune: #FCCC60; --vert: #728A2C;
        }
        body { font-family: sans-serif; margin: 0; text-align: center; background: #f9f9f9; color: #333; }
        header { background: white; padding: 20px; border-bottom: 5px solid var(--vert); }
        .hero { background: linear-gradient(135deg, var(--pale), var(--jaune)); padding: 60px 20px; color: white; }
        .btn { background: var(--rose); color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 20px; font-weight: bold; }
        .chat { font-size: 80px; margin: 20px; }
    </style>
</head>
<body>
    <header><h1>Au-delà des Pages 🐾</h1></header>
    <section class="hero">
        <h2>L'accompagnement qui donne du peps à vos écrits !</h2>
        <p>Éditrice • Librairie • Coaching Auteurs</p>
        <a href="https://payhip.com/ton-lien" class="btn">Voir mes Services</a>
    </section>
    <div class="chat">🐱</div>
</body>
</html>
